<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
      <p class="name">Rock Paper Scissors</p>
        <button class="move-btn" onclick="playUser('rock')">
          <img class="move-image" src="images/paper-emoji.png" />
        </button>
        <button class="move-btn" onclick="playUser('paper')">
          <img class="move-image" src="images/rock-emoji.png" />
        </button>
        <button class="move-btn" onclick="playUser('scissors')">
          <img class="move-image" src="images/scissors-emoji.png" />
        </button>
        <p class="js-result result"></p>
        <p class="js-moves moves"></p>
        <p class="js-score scores"></p>
        <button
          class="reset-score-btn"
          onclick="
            score.wins = 0;
            score.losses = 0;
            score.ties = 0;
            localStorage.removeItem('score');
            UpdateScore(); // ekkada update score button function enduku antey score reset cheyyadam kosam
            // alage reset click cheyyaganee score reset avvali andhuku
          "
        >
          Reset Score
        </button>
        <script src="script.js"></script>
  </body>
</html>
